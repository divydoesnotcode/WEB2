<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment</title>
    <style>
        body{
            background-color: #1a1a1a;
            padding: 0;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: #3a3a3a;
            border-radius: 10px;
            width: 300px;
            padding: 30px;
        }
        h2{
            color: aliceblue;
            text-align: center;
        }
        form{
            display: flex;
            flex-direction: column;
            margin: 10px;
        }
        input{
            background-color: #1a1a1a;
            color: aliceblue;
            border-radius: 10px;
            padding: 10px;
            margin: 7px;
        }
        button{
            border-radius: 10px;
            padding: 10px;
            margin: 7px;
        }
        button:hover{
            background-color: #1a1a1a;
            color: aliceblue;   
        }
        .input-row{
            display: flex;
            flex-direction: row;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form action="">
            <input type="email" name="" id="" placeholder="Email">
            <div class="input-row">
                <input type="text" name="" id="" placeholder="First Name" style="width: 100px;">
                <input type="text" name="" id="" placeholder="Last Name" style="width: 100px;">
            </div>
            <input type="password" name="" id="" placeholder="Password">
            <button type="submit">Sign Up</button>
        </form>
    </div>
</body>
</html>
